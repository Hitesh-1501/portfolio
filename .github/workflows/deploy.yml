name: Deploy Portfolio to GitHub Pages

on:
  push:
    branches:
      - main          # auto-deploys every time you push to main
  workflow_dispatch:  # also lets you trigger manually from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# Only allow one deploy at a time; cancel in-progress runs if a new push arrives
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
        # If your repo is at https://YOUR_USERNAME.github.io/YOUR_REPO_NAME/
        # Vite needs the base path. Set it here so you don't change vite.config.js.
        env:
          # Replace "portfolio" with your actual GitHub repo name
          # e.g. if repo is github.com/Hitesh-1501/my-portfolio → base = /my-portfolio/
          VITE_BASE_PATH: /portfolio/

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist   # Vite outputs to ./dist by default

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
